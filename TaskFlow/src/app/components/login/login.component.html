<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>✅ TaskFlow</h1>
      <h2>Iniciar Sesión</h2>
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">👤 Usuario</label>
        <input
          type="text"
          id="username"
          [(ngModel)]="username"
          name="username"
          placeholder="Ingrese su usuario"
          required
          autocomplete="off"
        >
      </div>

      <div class="form-group">
        <label for="password">🔒 Contraseña</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Ingrese su contraseña"
            required
          >
          <button type="button" class="toggle-password" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Ingresar</button>

      <div *ngIf="errorMessage" class="error-message">
        ⚠️ {{ errorMessage }}
      </div>
    </form>

    <div class="credentials-info">
      <h3>📝 Credenciales de prueba:</h3>
      <ul>
        <li><strong>admin</strong> / 1234 (Administrador)</li>
        <li><strong>alumno</strong> / testing (Alumno TP)</li>
        <li><strong>juan</strong> / juan123 (Juan Pérez)</li>
        <li><strong>maria</strong> / maria456 (María Gómez)</li>
      </ul>
      <p class="info-text">💡 Cada usuario tiene sus propias tareas almacenadas</p>
    </div>
  </div>
</div>
