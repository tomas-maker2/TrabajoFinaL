<div class="task-form-card">
  <h3>➕ Nueva Tarea</h3>
  
  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Nombre de la tarea *</label>
      <input
        type="text"
        id="name"
        [(ngModel)]="name"
        name="name"
        placeholder="Ej: Comprar alimentos"
        required
      >
    </div>

    <div class="form-group">
      <label for="description">Descripción</label>
      <textarea
        id="description"
        [(ngModel)]="description"
        name="description"
        rows="3"
        placeholder="Descripción detallada de la tarea..."
      ></textarea>
    </div>

    <div class="form-group">
      <label for="category">Categoría</label>
      <select id="category" [(ngModel)]="category" name="category">
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
      <div class="form-group">
      <label>⚡ Prioridad</label>
      <div class="priority-selector">
        <button
          *ngFor="let p of priorities"
          type="button"
          class="priority-btn"
          [class.selected]="priority === p.value"
          [style.background]="priority === p.value ? p.color : '#f0f0f0'"
          [style.color]="priority === p.value ? 'white' : '#333'"
          (click)="priority = p.value"
        >
          {{ p.label }}
        </button>
      </div>
    </div>
    <button type="submit" class="btn-add">Agregar Tarea</button>
  </form>
</div>
